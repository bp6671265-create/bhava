<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#004080,#00aaff);
    }

    .login-container{
        background:#fff;
        padding:30px;
        width:350px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
        text-align:center;
    }

    .logo{
        width:100px;
        height:100px;
        object-fit:contain;
        margin-bottom:15px;
    }

    h2{
        margin-bottom:20px;
        color:#004080;
    }

    .input-box{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:6px;
    }

    .login-btn{
        width:100%;
        padding:12px;
        background:#004080;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:16px;
    }

    .login-btn:hover{
        background:#002f5f;
    }

    .footer{
        margin-top:15px;
        font-size:14px;
        color:#666;
    }
</style>
</head>
<body>

<div class="login-container">
    <!-- College Logo -->
    <img src="kprcas_logo (1).png" alt="College Logo" class="logo">

    <h2>College Login</h2>

    <form>
        <input type="text" class="input-box" placeholder="Student ID" required>
        <input type="password" class="input-box" placeholder="Password" required>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
        © 2026 Your College Name
    </div>
</div>

</body>
</html>
